<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⬡</span>
      <span class="title">Fato ou Fake</span>
    </div>

    <div class="status" id="status">Inativo</div>

    <div class="keys-section" id="keysSection">
      <div class="key-field">
        <label class="key-label">Chave de API Anthropic</label>
        <input class="key-input" id="anthropicKey" type="password" placeholder="sk-ant-..." autocomplete="off"/>
      </div>
      <div class="key-hint" id="keyHint"></div>
    </div>

    <button class="toggle-btn" id="toggleBtn">Iniciar Checagem</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
